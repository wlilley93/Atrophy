name: Build and Release Hot Bundle

# Triggers on every push to main (except docs-only changes).
# Builds the hot bundle from the version already in package.json and
# attaches it to a GitHub Release. Does NOT bump the version - that's
# done locally via `pnpm release`.
#
# For manual version bumps, use workflow_dispatch with a bump type.

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'

  # Allow manual trigger with optional version bump
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump (none = use current version)'
        required: false
        default: 'none'
        type: choice
        options:
          - none
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  bundle:
    runs-on: ubuntu-latest

    # Skip version-bump commits from pnpm release to avoid infinite loops
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve version
        id: version
        run: |
          BUMP="${INPUT_BUMP:-none}"
          CURRENT=$(node -p "require('./package.json').version")

          if [ "${BUMP}" = "none" ]; then
            echo "version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            echo "Using existing version: ${CURRENT}"
          else
            NEW_VERSION=$(node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('package.json', 'utf-8'));
              const [major, minor, patch] = pkg.version.split('.').map(Number);
              const bump = process.env.INPUT_BUMP;
              if (bump === 'major') pkg.version = (major + 1) + '.0.0';
              else if (bump === 'minor') pkg.version = major + '.' + (minor + 1) + '.0';
              else pkg.version = major + '.' + minor + '.' + (patch + 1);
              fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
              process.stdout.write(pkg.version);
            ")
            echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
            echo "bumped=true" >> "$GITHUB_OUTPUT"
            echo "Bumped ${CURRENT} -> ${NEW_VERSION} (${BUMP})"
          fi
        env:
          INPUT_BUMP: ${{ github.event.inputs.bump }}

      - name: Build hot bundle
        run: |
          # Build TypeScript + renderer
          pnpm build

          mkdir -p dist

          # Create tarball excluding bootstrap (out/main/index.js stays frozen in asar)
          cd out
          tar czf ../dist/bundle.tar.gz \
            --exclude='main/index.js' \
            --exclude='main/index.js.map' \
            main/ preload/ renderer/
          cd ..

          # SHA-256 + manifest
          SHA256=$(sha256sum dist/bundle.tar.gz | cut -d' ' -f1)

          node -e "
            const fs = require('fs');
            fs.writeFileSync('dist/bundle-manifest.json', JSON.stringify({
              version: process.env.BUNDLE_VERSION,
              sha256: process.argv[1],
              timestamp: new Date().toISOString().replace(/\.\d+Z/, 'Z'),
            }, null, 2) + '\n');
          " "${SHA256}"

          echo "Bundle built: v${BUNDLE_VERSION} (${SHA256})"
        env:
          BUNDLE_VERSION: ${{ steps.version.outputs.version }}

      - name: Commit version bump
        if: steps.version.outputs.bumped == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "Bump version to ${BUNDLE_VERSION} [skip ci]"
          git push
        env:
          BUNDLE_VERSION: ${{ steps.version.outputs.version }}

      - name: Create or update GitHub Release
        run: |
          TAG="bundle-v${BUNDLE_VERSION}"

          # Extract release notes from changelog
          NOTES=$(node -e '
            const fs = require("fs");
            const ver = process.env.BUNDLE_VERSION;
            try {
              const text = fs.readFileSync("docs/CHANGELOG.md", "utf-8");
              const re = new RegExp("## " + ver.replace(/\./g, "\\.") + "[^\\n]*\\n");
              const match = re.exec(text);
              if (!match) process.exit(0);
              const rest = text.slice(match.index + match[0].length);
              const end = rest.search(/^---$/m);
              const section = (end >= 0 ? rest.slice(0, end) : rest).trim();
              if (section) process.stdout.write(section);
            } catch {}
          ' 2>/dev/null || true)

          if [ -z "${NOTES}" ]; then
            NOTES="Hot bundle v${BUNDLE_VERSION}."
          fi

          NOTES=$(printf '%s\n\n---\nDownloaded automatically by the app on next restart.' "${NOTES}")

          # Create or update release (using bundle-v prefix, matching local release script)
          if gh release view "${TAG}" &>/dev/null; then
            echo "Updating existing release ${TAG}..."
            gh release edit "${TAG}" --title "v${BUNDLE_VERSION}" --notes "${NOTES}"
            gh release delete-asset "${TAG}" bundle.tar.gz --yes 2>/dev/null || true
            gh release delete-asset "${TAG}" bundle-manifest.json --yes 2>/dev/null || true
            gh release upload "${TAG}" \
              dist/bundle.tar.gz \
              dist/bundle-manifest.json
          else
            echo "Creating release ${TAG}..."
            gh release create "${TAG}" \
              --title "v${BUNDLE_VERSION}" \
              --notes "${NOTES}" \
              dist/bundle.tar.gz \
              dist/bundle-manifest.json
          fi

          echo "Release ${TAG} published."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUNDLE_VERSION: ${{ steps.version.outputs.version }}
