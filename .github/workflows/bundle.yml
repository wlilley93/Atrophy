name: Build and Release Hot Bundle

# Triggers on every push to main.
# Bumps the patch version, builds the hot bundle, and attaches it to a
# GitHub Release. Existing installs pick it up automatically on next boot.

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'

  # Allow manual trigger from the Actions tab
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: false
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  bundle:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump version
        id: version
        run: |
          BUMP="${{ github.event.inputs.bump || 'patch' }}"

          OLD_VERSION=$(node -p "require('./package.json').version")

          NEW_VERSION=$(node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf-8'));
            const [major, minor, patch] = pkg.version.split('.').map(Number);
            const bump = '${BUMP}';
            if (bump === 'major') pkg.version = (major + 1) + '.0.0';
            else if (bump === 'minor') pkg.version = major + '.' + (minor + 1) + '.0';
            else pkg.version = major + '.' + minor + '.' + (patch + 1);
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            process.stdout.write(pkg.version);
          ")

          echo "old=${OLD_VERSION}" >> "$GITHUB_OUTPUT"
          echo "new=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Bumped ${OLD_VERSION} -> ${NEW_VERSION} (${BUMP})"

      - name: Build hot bundle
        run: |
          VERSION="${{ steps.version.outputs.new }}"

          # Build TypeScript + renderer
          pnpm build

          mkdir -p dist

          # Create tarball excluding bootstrap (out/main/index.js stays frozen in asar)
          cd out
          tar czf ../dist/bundle.tar.gz \
            --exclude='main/index.js' \
            --exclude='main/index.js.map' \
            main/ preload/ renderer/
          cd ..

          # SHA-256
          SHA256=$(sha256sum dist/bundle.tar.gz | cut -d' ' -f1)

          # Write manifest
          node -e "
            const fs = require('fs');
            fs.writeFileSync('dist/bundle-manifest.json', JSON.stringify({
              version: '${VERSION}',
              sha256: '${SHA256}',
              timestamp: new Date().toISOString().replace(/\.\d+Z/, 'Z'),
            }, null, 2) + '\n');
          "

          echo "Bundle built: v${VERSION} (${SHA256})"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "Bump version to ${{ steps.version.outputs.new }} [skip ci]"
          git push

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.new }}"
          TAG="v${VERSION}"

          # Extract release notes from changelog
          NOTES=$(node -e '
            const fs = require("fs");
            const ver = process.argv[1];
            try {
              const text = fs.readFileSync("docs/CHANGELOG.md", "utf-8");
              const re = new RegExp("## " + ver.replace(/\./g, "\\.") + "[^\\n]*\\n");
              const match = re.exec(text);
              if (!match) process.exit(0);
              const rest = text.slice(match.index + match[0].length);
              const end = rest.search(/^---$/m);
              const section = (end >= 0 ? rest.slice(0, end) : rest).trim();
              if (section) process.stdout.write(section);
            } catch {}
          ' "${VERSION}" 2>/dev/null || true)

          if [ -z "${NOTES}" ]; then
            NOTES="Hot bundle v${VERSION}."
          fi

          NOTES=$(printf '%s\n\n---\nDownloaded automatically by the app on next restart.' "${NOTES}")

          # Create or update release
          if gh release view "${TAG}" &>/dev/null; then
            echo "Updating existing release ${TAG}..."
            gh release delete-asset "${TAG}" bundle.tar.gz --yes 2>/dev/null || true
            gh release delete-asset "${TAG}" bundle-manifest.json --yes 2>/dev/null || true
            gh release upload "${TAG}" \
              dist/bundle.tar.gz \
              dist/bundle-manifest.json
          else
            echo "Creating release ${TAG}..."
            gh release create "${TAG}" \
              --title "v${VERSION}" \
              --notes "${NOTES}" \
              dist/bundle.tar.gz \
              dist/bundle-manifest.json
          fi

          echo "Release ${TAG} published."
