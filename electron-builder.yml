appId: com.atrophy.app
productName: Atrophy
copyright: Copyright © 2024-2026 Will Lilley

directories:
  output: dist
  buildResources: resources

files:
  - out/**/*
  - "!out/**/*.map"

asarUnpack:
  # Native .node binaries for onnxruntime - must live outside asar to load at runtime.
  # Both @xenova (embeddings) and @huggingface (kokoro TTS) load onnxruntime-node
  # via dynamic import; if it's inside asar the module resolver can't find it.
  - "node_modules/onnxruntime-node/**/*"
  - "node_modules/@xenova/transformers/**/*"
  - "node_modules/@huggingface/transformers/**/*"
  - "node_modules/kokoro-js/**/*"
  - "node_modules/phonemizer/**/*"

mac:
  category: public.app-category.utilities
  target:
    - dmg
    - zip
  icon: resources/icons/TheAtrophiedMind.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: true
  extraResources:
    # - from: vendor/whisper.cpp  # uncomment when whisper binary is bundled
    #   to: whisper
    #   filter:
    #     - "**/*"
    - from: mcp/
      to: mcp
      filter:
        - "**/*.py"
    - from: config.py
      to: config.py
    - from: core/
      to: core
      filter:
        - "**/*.py"
    - from: scripts/
      to: scripts
      filter:
        - "**/*"
    - from: agents/
      to: agents
      filter:
        - "**/*"
        - "!**/avatar/**"
    - from: voice/
      to: voice
      filter:
        - "**/*.py"
    - from: db/
      to: db
      filter:
        - "**/*.sql"
    - from: docs/agent-reference.md
      to: docs/agent-reference.md
    - from: resources/icons/
      to: icons
      filter:
        - "menubar_brain*.png"

dmg:
  title: "Atrophy Install"
  artifactName: "${productName}-${version}-${arch}.${ext}"
  background: build/dmg-background.png
  icon: resources/icons/TheAtrophiedMind.icns
  iconSize: 80
  iconTextSize: 12
  contents:
    - x: 130
      y: 150
      type: file
    - x: 390
      y: 150
      type: link
      path: /Applications
  window:
    x: 400
    y: 200
    width: 520
    height: 320

publish:
  provider: github
  owner: wlilley93
  repo: Atrophy
